.s3 sync:
  stage: s3 sync
  needs: []
  image: ${PYTHON_IMAGE}
  tags: [io, docker-exec]
  before_script:
    - pip install s3cmd
  script:
    # Создаем s3 config с кредами бакета
    - cp .s3/.s3cfg .s3cfg.conf
    - echo "access_key = \"${S3_ACCESS_KEY_ID}\"" >> .s3cfg.conf
    - echo "secret_key = \"${S3_SECRET_ACCESS_KEY}\"" >> .s3cfg.conf

    # Синхронизация файлов /static/ и бакета
    - s3cmd -c .s3cfg.conf sync ./static/img/ s3://${S3_BUCKET_NAME}/static/img/ --acl-public
    - s3cmd -c .s3cfg.conf sync ./static/video/ s3://${S3_BUCKET_NAME}/static/video/ --acl-public
